    name: Dados Abertos POA CKAN Action API
    description: >-
      CKAN Action API for Dados Abertos POA, a consistent JSON-over-HTTP interface over a catalog of an open datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://dados.portoalegre.rs.gov.br/api/3/action/.
